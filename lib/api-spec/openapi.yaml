openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ContextOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: tenants
  - name: principals
  - name: context
  - name: dashboard
  - name: linked-accounts
  - name: adapters
  - name: capabilities
  - name: intents
  - name: runs
  - name: actions
  - name: approvals
  - name: artifacts
  - name: memory
  - name: audit
  - name: agents
  - name: model-endpoints
  - name: api-keys
  - name: commands
  - name: integrations
  - name: observability
  - name: settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [context]
      summary: Current owner + tenant context
      responses:
