components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    JsonObject:
      type: object
      additionalProperties: true

    User:
      type: object
      required: [id, email, name, isOwner]
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        avatarUrl: { type: ["string", "null"] }
        isOwner: { type: boolean }

    Tenant:
      type: object
      required: [id, name, slug, isDefault]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        isDefault: { type: boolean }

    MeContext:
      type: object
      required: [user, tenant, tenants]
      properties:
        user: { $ref: "#/components/schemas/User" }
        tenant: { $ref: "#/components/schemas/Tenant" }
        tenants:
          type: array
          items: { $ref: "#/components/schemas/Tenant" }

    DashboardSummary:
      type: object
      required:
        [
          adapterCount,
          capabilityCount,
          activeRunCount,
          pendingApprovalCount,
          agentCount,
          generatedServerCount,
          traceCount,
        ]
      properties:
        adapterCount: { type: integer }
        capabilityCount: { type: integer }
        activeRunCount: { type: integer }
        pendingApprovalCount: { type: integer }
        agentCount: { type: integer }
        modelEndpointCount: { type: integer }
        generatedServerCount: { type: integer }
        traceCount: { type: integer }
        intentCount: { type: integer }
        recentArtifacts:
          type: array
          items: { $ref: "#/components/schemas/Artifact" }
        recentAudit:
          type: array
          items: { $ref: "#/components/schemas/AuditRecord" }
        recentRuns:
          type: array
          items: { $ref: "#/components/schemas/Run" }

    LinkedAccount:
      type: object
      required: [id, systemName, displayName, authMode, status, createdAt]
      properties:
        id: { type: string }
        systemName: { type: string }
        displayName: { type: string }
        authMode: { type: string }
        status: { type: string }
        credentialRef: { type: ["string", "null"] }
        scopes: { type: ["array", "null"], items: { type: string } }
        accountIdentifier: { type: ["string", "null"] }
        lastRefreshedAt: { type: ["string", "null"], format: date-time }
        expiresAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    LinkedAccountInput:
      type: object
      required: [systemName, displayName, authMode]
      properties:
        systemName: { type: string, minLength: 1 }
        displayName: { type: string, minLength: 1 }
        authMode: { type: string }
        credentialRef: { type: string }
        accountIdentifier: { type: string }
        scopes: { type: array, items: { type: string } }

    Adapter:
      type: object
      required:
        [id, name, transport, protocolVersion, status, isGenerated, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        transport: { type: string }
        protocolVersion: { type: string }
        endpointUrl: { type: ["string", "null"] }
        sessionMode: { type: string }
        status: { type: string }
        linkedAccountId: { type: ["string", "null"] }
        isGenerated: { type: boolean }
        authType: { type: ["string", "null"] }
        allowPrivateNetwork: { type: ["boolean", "null"] }
        createdVia: { type: ["string", "null"] }
        lastDiscoveredAt: { type: ["string", "null"], format: date-time }
        lastHealthAt: { type: ["string", "null"], format: date-time }
        capabilityCount: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
    AdapterDetail:
      allOf:
        - $ref: "#/components/schemas/Adapter"
        - type: object
          properties:
            capabilities:
              type: array
              items: { $ref: "#/components/schemas/Capability" }
            lastHealthResult: { $ref: "#/components/schemas/JsonObject" }
    AdapterInput:
      type: object
      required: [name, transport]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        transport: { type: string }
        protocolVersion: { type: string }
        endpointUrl: { type: string }
        sessionMode: { type: string }
        linkedAccountId: { type: string }
    AdapterUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        endpointUrl: { type: string }
        sessionMode: { type: string }
        status: { type: string }

    Capability:
      type: object
      required: [id, adapterId, type, name, riskTier, actionKind, createdAt]
      properties:
        id: { type: string }
        adapterId: { type: string }
        type: { type: string }
        name: { type: string }
        description: { type: ["string", "null"] }
        riskTier: { type: string }
        actionKind: { type: string }
        humanReviewRequired: { type: boolean }
        inputSchema: { $ref: "#/components/schemas/JsonObject" }
        outputSchema: { $ref: "#/components/schemas/JsonObject" }
        executionKind: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    HealthTestResult:
      type: object
      required: [ok, latencyMs, message]
      properties:
        ok: { type: boolean }
        latencyMs: { type: integer }
        message: { type: string }
        details: { $ref: "#/components/schemas/JsonObject" }

    ConstructedServerInput:
      type: object
      required: [name, baseUrl]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        baseUrl: { type: string, minLength: 1 }
        allowPrivateNetwork: { type: boolean }

    ImportOpenApiInput:
      type: object
      properties:
        specUrl: { type: string }
        specText: { type: string }
        baseUrl: { type: string }
        replaceExisting: { type: boolean }

    WebToolInput:
      type: object
      required: [name, kind]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        kind: { type: string, enum: [http, browser] }
        actionKind: { type: string }
        riskTier: { type: string }
        humanReviewRequired: { type: boolean }
        inputSchema: { $ref: "#/components/schemas/JsonObject" }
        recipe: { $ref: "#/components/schemas/JsonObject" }

    ConstructedAuthInput:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [none, bearer, api_key_header, query] }
        name: { type: string }
        secret: { type: string }

    InvokeCapabilityInput:
      type: object
      properties:
        arguments: { $ref: "#/components/schemas/JsonObject" }

    InvokeCapabilityResult:
      type: object
      required: [ok, kind, durationMs]
      properties:
        ok: { type: boolean }
        kind: { type: string }
        status: { type: ["integer", "null"] }
        durationMs: { type: integer }
        body: {}
        extracted: { $ref: "#/components/schemas/JsonObject" }
        error: { type: ["string", "null"] }

    Intent:
      type: object
      required: [id, title, goal, status, riskTier, createdAt]
      properties:
        id: { type: string }
        title: { type: string }
        goal: { type: string }
        constraints: { type: ["string", "null"] }
        successCriteria: { type: ["string", "null"] }
        allowedSystems: { type: ["array", "null"], items: { type: string } }
        deniedSystems: { type: ["array", "null"], items: { type: string } }
        budgetTokens: { type: ["integer", "null"] }
        budgetUsd: { type: ["integer", "null"] }
        maxSteps: { type: ["integer", "null"] }
        riskTier: { type: string }
        status: { type: string }
        runCount: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
    IntentInput:
      type: object
      required: [title, goal]
      properties:
        title: { type: string, minLength: 1 }
        goal: { type: string, minLength: 1 }
        constraints: { type: string }
        successCriteria: { type: string }
        allowedSystems: { type: array, items: { type: string } }
        deniedSystems: { type: array, items: { type: string } }
        budgetTokens: { type: integer }
        budgetUsd: { type: integer }
        maxSteps: { type: integer }
        riskTier: { type: string }
    IntentUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        goal: { type: string, minLength: 1 }
        constraints: { type: string }
        successCriteria: { type: string }
        riskTier: { type: string }
        status: { type: string }
    StartRunInput:
      type: object
      properties:
        orchestrationMode: { type: string }
        leadAgentId: { type: string }

    Run:
      type: object
      required: [id, intentId, status, orchestrationMode, createdAt]
      properties:
        id: { type: string }
        intentId: { type: string }
        intentTitle: { type: ["string", "null"] }
        status: { type: string }
        orchestrationMode: { type: string }
        leadAgentId: { type: ["string", "null"] }
        summary: { type: ["string", "null"] }
        error: { type: ["string", "null"] }
        tokensUsed: { type: integer }
        costUsdMicros: { type: integer }
        traceId: { type: ["string", "null"] }
        startedAt: { type: ["string", "null"], format: date-time }
        completedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    RunDetail:
      allOf:
        - $ref: "#/components/schemas/Run"
        - type: object
          properties:
            intent: { $ref: "#/components/schemas/Intent" }
            taskGraph: { $ref: "#/components/schemas/JsonObject" }
            actions:
              type: array
              items: { $ref: "#/components/schemas/Action" }
